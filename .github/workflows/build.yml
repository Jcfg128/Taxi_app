name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Instalar dependencias del sistema
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git unzip openjdk-17-jdk wget curl

      # 3️⃣ Instalar Buildozer, Cython y Python-for-Android
      - name: Install Buildozer and dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install buildozer cython python-for-android

      # 4️⃣ Descargar y configurar Android SDK
      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools/latest
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" "platforms;android-33" "build-tools;33.0.0"

      # 5️⃣ Limpiar compilaciones previas
      - name: Clean Buildozer
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          buildozer android clean

      # 6️⃣ Forzar descarga y preparación de Python-for-Android
      - name: Update Buildozer / Prepare Python-for-Android
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          buildozer android update

      # 7️⃣ Compilar APK
      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          buildozer android debug

      # 8️⃣ Subir APK como artefacto
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-APK
          path: bin/*.apk
