name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Instalar dependencias del sistema
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git unzip openjdk-17-jdk wget curl zip

      # 3️⃣ Cache de pip
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4️⃣ Instalar Buildozer, Cython y Python-for-Android
      - name: Install Buildozer and dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install buildozer cython python-for-android

      # 5️⃣ Configurar Android SDK correctamente
      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools/latest
          # Mover cmdline-tools dentro de latest si es necesario
          mv $ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest/latest

          # Aceptar licencias automáticamente
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses

          # Instalar herramientas necesarias (estables)
          $ANDROID_SDK_ROOT/cmdline-tools/latest/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" "platforms;android-33" "build-tools;33.0.0"

      # 6️⃣ Cache Buildozer y Android SDK/NDK
      - name: Cache Buildozer and SDK
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer
            $HOME/android-sdk
          key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}

      # 7️⃣ Limpiar compilaciones anteriores
      - name: Clean Buildozer
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          buildozer android clean || true

      # 8️⃣ Preparar Python-for-Android
      - name: Prepare Python-for-Android
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          buildozer android update

      # 9️⃣ Compilar APK
      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          buildozer android debug

      # 🔟 Subir APK como artefacto
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-APK
          path: bin/*.apk
